      type: apiKey
    AccessTokenAuth:
      description: Access token authentication scheme which uses an access token provided by the Tower API as part of a Tower session (see documentation about creating sessions).
      scheme: Bearer
      type: http
info:
  contact:
    email: hello@tower.dev
    name: Tower Computing GmbH
    url: https://tower.dev
  description: REST API to interact with Tower Services.
  termsOfService: https://tower.dev/terms
  title: Tower API
  version: v0.10.22
openapi: 3.1.0
paths:
  /accounts:
    post:
      description: This is the primary way that users register new accounts with Tower.
      operationId: create-account
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccountParams"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAccountResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Create account
  /accounts/{name}:
    get:
      description: Get information about a specific account by name.
      operationId: describe-account
      parameters:
        - description: The name of the account to describe
          in: path
          name: name
          required: true
          schema:
            description: The name of the account to describe
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeAccountBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - AccessTokenAuth:
            - teams:read
        - APIKeyAuth:
            - teams:read
      summary: Describe account
    put:
      description: Update the properties of an account
      operationId: update-account
      parameters:
        - description: The name of the account to update
          in: path
          name: name
          required: true
          schema:
            description: The name of the account to update
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAccountParams"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateAccountResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - AccessTokenAuth:
            - teams:update
        - APIKeyAuth:
            - teams:update
      summary: Update account
  /alerts:
    get:
      description: List alerts for the current account with optional filtering
      operationId: list-alerts
      parameters:
        - description: The page number to fetch.
          explode: false
          in: query
          name: page
          schema:
            default: 1
            description: The page number to fetch.
            format: int64
            type: integer
        - description: The number of records to fetch on each page.
          explode: false
          in: query
          name: page_size
          schema:
            default: 20
            description: The number of records to fetch on each page.
            format: int64
            type: integer
        - description: Filter alerts by alert type
          explode: false
          in: query
          name: alert_type
          schema:
            description: Filter alerts by alert type
            type: string
        - description: Filter alerts created after or at this datetime (inclusive)
          explode: false
          in: query
          name: start_at
          schema:
            description: Filter alerts created after or at this datetime (inclusive)
            format: date-time
            type: string
        - description: Filter alerts created before or at this datetime (inclusive)
          explode: false
          in: query
          name: end_at
          schema:
            description: Filter alerts created before or at this datetime (inclusive)
            format: date-time
            type: string
        - description: Filter alerts by acknowledged status.
          explode: false
          in: query
          name: acked
          schema:
            description: Filter alerts by acknowledged status.
            type: string
        - description: Filter alerts by environment (e.g., production, staging)
          explode: false
          in: query
          name: environment
          schema:
            description: Filter alerts by environment (e.g., production, staging)
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAlertsResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - AccessTokenAuth:
            - notifications:read
        - APIKeyAuth:
            - notifications:read
      summary: List alerts
  /alerts/acknowledge-all:
    post:
      description: Mark all unacknowledged alerts as acknowledged for the current user in the current account
      operationId: acknowledge-all-alerts
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcknowledgeAllAlertsResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - AccessTokenAuth:
            - notifications:update
        - APIKeyAuth:
            - notifications:update
      summary: Acknowledge all alerts
  /alerts/stream:
    get:
      description: Streams alert notifications in real-time
      operationId: stream-alerts
      responses:
        "200":
          content:
            text/event-stream:
              schema:
                description: Each oneOf object in the array represents one possible Server Sent Events (SSE) message, serialized as UTF-8 text according to the SSE specification.
                items:
                  oneOf:
                    - properties:
                        data:
                          $ref: "#/components/schemas/Alert"
                        event:
                          const: alert
                          description: The event name.
                          type: string
                        id:
                          description: The event ID.
                          type: integer
                        retry:
                          description: The retry time in milliseconds.
                          type: integer
                      required:
                        - data
                        - event
                      title: Event alert
                      type: object
                    - properties:
                        data:
                          $ref: "#/components/schemas/SSEWarning"
                        event:
                          const: error
                          description: The event name.
                          type: string
                        id:
                          description: The event ID.
                          type: integer
                        retry:
                          description: The retry time in milliseconds.
                          type: integer
                      required:
                        - data
                        - event
                      title: Event error
                      type: object
                title: Server Sent Events
                type: array
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - AccessTokenAuth:
            - notifications:read
        - APIKeyAuth:
            - notifications:read
      summary: Stream alert notifications
  /alerts/{alert_id}:
    delete:
      description: Permanently delete an alert
      operationId: delete-alert
      parameters:
        - description: ID of the alert to delete
          in: path
          name: alert_id
          required: true
          schema:
            description: ID of the alert to delete
            type: string
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - AccessTokenAuth:
            - notifications:delete
        - APIKeyAuth:
            - notifications:delete
      summary: Delete alert
  /alerts/{alert_seq}/acknowledge:
    post:
      description: Mark an alert as acknowledged
      operationId: acknowledge-alert
      parameters:
        - description: Seq of the alert to acknowledge
          in: path
          name: alert_seq
          required: true
          schema:
            description: Seq of the alert to acknowledge
            format: int64
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcknowledgeAlertResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - AccessTokenAuth:
            - notifications:update
        - APIKeyAuth:
            - notifications:update
      summary: Acknowledge alert
  /api-keys:
    delete:
      operationId: delete-api-key
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteAPIKeyParams"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAPIKeyResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - AccessTokenAuth:
            - api_keys:delete
        - APIKeyAuth:
            - api_keys:delete
      summary: Delete API key
    get:
      description: List all the API keys associated with your current account.
      operationId: list-api-keys
      parameters:
        - description: The page number to fetch.
          explode: false
          in: query
          name: page
          schema:
            default: 1
            description: The page number to fetch.
            format: int64
            type: integer
        - description: The number of records to fetch on each page.
          explode: false
          in: query
          name: page_size
          schema:
            default: 20
            description: The number of records to fetch on each page.
            format: int64
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAPIKeysResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - AccessTokenAuth:
            - api_keys:read
        - APIKeyAuth:
            - api_keys:read
      summary: List API keys
    post:
      operationId: create-api-key
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAPIKeyParams"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAPIKeyResponse"
          description: Created
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - AccessTokenAuth:
            - api_keys:create
        - APIKeyAuth:
            - api_keys:create
      summary: Create API Key
  /apps:
    get:
      description: Get all the apps for the current account.
      operationId: list-apps
      parameters:
        - description: The page number to fetch.
          explode: false
          in: query
          name: page
          schema:
            default: 1
            description: The page number to fetch.
            format: int64
            type: integer
        - description: The number of records to fetch on each page.
          explode: false
          in: query
          name: page_size
          schema:
            default: 20
            description: The number of records to fetch on each page.
            format: int64
            type: integer
        - description: The search query to filter apps by.
          explode: false
          in: query
          name: query
          schema:
            description: The search query to filter apps by.
            type: string
        - description: Number of recent runs to fetch (-1 for all runs, defaults to 20)
          explode: false
          in: query
          name: num_runs
          schema:
            default: 20
            description: Number of recent runs to fetch (-1 for all runs, defaults to 20)
            format: int64
            type: integer
        - description: Sort order for the results.
          explode: false
          in: query
          name: sort
          schema:
            default: created_at
            description: Sort order for the results.
            enum:
              - most_recent_run
              - a_to_z
              - created_at
              - updated_at
            type: string
        - description: Filter to see apps with certain statuses.
          explode: false
          in: query
          name: filter
          schema:
            description: Filter to see apps with certain statuses.
            enum:
              - disabled
              - running
              - withWarning
              - healthy
              - scheduled
            type: string
        - description: The environment to filter the apps by. If not provided, apps for all environments will be returned.
          explode: false
          in: query
          name: environment
          schema:
            description: The environment to filter the apps by. If not provided, apps for all environments will be returned.
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAppsResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - AccessTokenAuth:
            - apps:read
        - APIKeyAuth:
            - apps:read
      summary: List apps
      x-shoulder-tap-events:
        - apps.*
        - runs.*
    post:
      description: Create a new app in the current account.
      operationId: create-app
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAppParams"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAppResponse"
          description: Created
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - AccessTokenAuth:
            - apps:create
        - APIKeyAuth:
            - apps:create
      summary: Create app
  /apps/{name}:
    delete:
      description: Delete one of your apps, the associated code, and all the runs as well.
      operationId: delete-app
      parameters:
        - description: The name of the app to delete.
          in: path
          name: name
          required: true
          schema:
            description: The name of the app to delete.
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAppResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - AccessTokenAuth:
            - apps:delete
        - APIKeyAuth:
            - apps:delete
      summary: Delete app
    get:
      description: Get all the runs for the current account.
      operationId: describe-app
      parameters:
        - description: The name of the app to fetch.
          in: path
          name: name
          required: true
          schema:
            description: The name of the app to fetch.
            type: string
        - description: The number of recent runs to fetch for the app.
          explode: false
          in: query
          name: runs
          schema:
            description: The number of recent runs to fetch for the app.
            format: int64
            type: integer
        - description: Filter runs scheduled after this datetime (inclusive). Provide timestamps in ISO-8601 format.
          explode: false
          in: query
          name: start_at
          schema:
            description: Filter runs scheduled after this datetime (inclusive). Provide timestamps in ISO-8601 format.
            format: date-time
            type: string
        - description: Filter runs scheduled before or at this datetime (inclusive). Provide timestamps in ISO-8601 format.
          explode: false
          in: query
          name: end_at
          schema:
            description: Filter runs scheduled before or at this datetime (inclusive). Provide timestamps in ISO-8601 format.
            format: date-time
            type: string
        - description: Timezone for the statistics (e.g., 'Europe/Berlin'). Defaults to UTC.
          explode: false
          in: query
          name: timezone
          schema:
            default: UTC
            description: Timezone for the statistics (e.g., 'Europe/Berlin'). Defaults to UTC.
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeAppResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - AccessTokenAuth:
            - apps:read
        - APIKeyAuth:
            - apps:read
      summary: Describe app
      x-shoulder-tap-events:
        - apps.*
        - runs.*
    put:
      description: Update an app in the currently authenticated account.
      operationId: update-app
      parameters:
        - description: The name of the App to update.
          in: path
          name: name
          required: true
          schema:
            description: The name of the App to update.
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAppParams"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateAppResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - AccessTokenAuth:
            - apps:update
        - APIKeyAuth:
            - apps:update
      summary: Update app
  /apps/{name}/deploy:
    post:
      description: Deploy a new version of an app. Accepts either a TAR file upload (application/tar) or a JSON body with source_uri (application/json) for deploying from a GitHub repository.
      operationId: deploy-app
      parameters:
        - description: The name of the app to deploy.
          in: path
          name: name
          required: true
          schema:
            description: The name of the app to deploy.
            type: string
        - description: The SHA256 hash of the content, used to verify integrity.
          in: header
          name: X-Tower-Checksum-SHA256
          schema:
            description: The SHA256 hash of the content, used to verify integrity.
            type: string
        - description: Size of the uploaded bundle in bytes.
          in: header
          name: Content-Length
          schema:
            description: Size of the uploaded bundle in bytes.
            format: int64
            type: integer
        - description: The environment to deploy to. Defaults to 'default'.
          explode: false
          in: query
          name: environment
          schema:
            description: The environment to deploy to. Defaults to 'default'.
            type: string
        - description: Whether to deploy to all environments for this app. If true, the 'environment' query parameter is ignored.
          explode: false
          in: query
          name: all_environments
          schema:
            default: false
            description: Whether to deploy to all environments for this app. If true, the 'environment' query parameter is ignored.
            type: boolean
      requestBody:
        content:
          application/json:
            schema:
              examples:
                - source_uri: https://github.com/tower/tower-examples/tree/main/01-hello-world
              properties:
                source_uri:
                  description: GitHub repository URL for deploying from source
                  format: uri
                  type: string
              required:
                - source_uri
              type: object
          application/octet-stream:
            schema:
              contentMediaType: application/octet-stream
              description: A .tar or .tar.gz file containing the code to deploy and MANIFEST
              examples:
                - <binary tar file stream>
              format: binary
              type: string
        description: Deploy app using either a tar file upload or GitHub source URL
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeployAppResponse"
          description: Created
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Bad Request
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
      security:
        - AccessTokenAuth:
            - apps:deploy
        - APIKeyAuth:
            - apps:deploy
      summary: Deploy app
  /apps/{name}/environments:
    get:
      description: Generates a list of all the known environments for a given app in the current account.
      operationId: list-app-environments
      parameters:
        - description: The name of the app to get the version for.
          in: path
          name: name
          required: true
          schema:
            description: The name of the app to get the version for.
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAppEnvironmentsResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - AccessTokenAuth:
            - apps:read
        - APIKeyAuth:
            - apps:read
      summary: List app environments
  /apps/{name}/environments/{environment}:
    put:
      description: Update the configuration of an app in a specific environment, such as which version is deployed.
      operationId: update-app-environment
      parameters:
        - description: The name of the app.
          in: path
          name: name
          required: true
          schema:
            description: The name of the app.
            type: string
        - description: The name of the environment.
          in: path
          name: environment
          required: true
          schema:
            description: The name of the environment.
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAppEnvironmentParams"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateAppEnvironmentResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - AccessTokenAuth:
            - apps:deploy
        - APIKeyAuth:
            - apps:deploy
      summary: Update app environment
  /apps/{name}/runs:
    get:
      description: Generates a list of all the runs for a given app. The list is paginated based on the query string parameters passed in.
      operationId: list-runs
      parameters:
        - description: The page number to fetch.
          explode: false
          in: query
          name: page
          schema:
            default: 1
            description: The page number to fetch.
            format: int64
            type: integer
        - description: The number of records to fetch on each page.
          explode: false
          in: query
          name: page_size
          schema:
            default: 20
            description: The number of records to fetch on each page.
            format: int64
            type: integer
        - description: The name of the app to fetch runs for.
          in: path
          name: name
          required: true
          schema:
            description: The name of the app to fetch runs for.
            type: string
        - description: Filter runs by status(es). Define multiple with a comma-separated list. Supplying none will return all statuses.
          explode: false
          in: query
          name: status
          schema:
            default:
              - pending
              - running
              - crashed
              - errored
              - exited
              - cancelled
              - retrying
            description: Filter runs by status(es). Define multiple with a comma-separated list. Supplying none will return all statuses.
            items:
              enum:
                - pending
                - running
                - crashed
                - errored
                - exited
                - cancelled
                - retrying
              type: string
            type: array
        - description: Filter runs scheduled after or at this datetime (inclusive)
          explode: false
          in: query
          name: start_at
          schema:
            description: Filter runs scheduled after or at this datetime (inclusive)
            format: date-time
            type: string
        - description: Filter runs scheduled before or at this datetime (inclusive)
          explode: false
          in: query
          name: end_at
          schema:
            description: Filter runs scheduled before or at this datetime (inclusive)
            format: date-time
            type: string
        - description: Filter runs by environment. If not provided, all environments will be included.
          explode: false
          in: query
          name: environment
          schema:
            description: Filter runs by environment. If not provided, all environments will be included.
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRunsResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - AccessTokenAuth:
            - runs:read
        - APIKeyAuth:
            - runs:read
      summary: List runs
      x-shoulder-tap-events:
        - runs.*
    post:
      description: Runs an app with the supplied parameters.
      operationId: run-app
      parameters:
        - description: The name of the app to fetch runs for.
          in: path
          name: name
          required: true
          schema:
            description: The name of the app to fetch runs for.
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunAppParams"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunAppResponse"
                type: object
          description: Created
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
                type: object
          description: Unauthorized
      security:
        - AccessTokenAuth:
            - apps:run
        - APIKeyAuth:
            - apps:run
      summary: Run app
  /apps/{name}/runs/{seq}:
    get:
      description: Describe a run of an app.
      operationId: describe-run
      parameters:
        - description: The name of the app to fetch runs for.
          in: path
          name: name
          required: true
          schema:
            description: The name of the app to fetch runs for.
            type: string
        - description: The number of the run to fetch.
          in: path
          name: seq
