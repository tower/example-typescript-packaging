components:
  schemas:
    APIKey:
      additionalProperties: false
      properties:
        created_at:
          format: date-time
          type: string
        expires_at:
          format: date-time
          type: string
        identifier:
          type: string
        last_used_at:
          format: date-time
          type:
            - string
            - "null"
        name:
          type: string
        scopes:
          type: string
      required:
        - name
        - identifier
        - last_used_at
        - created_at
      type: object
    Account:
      additionalProperties: false
      properties:
        execution_region:
          type: string
        is_self_hosted_only:
          type: boolean
        name:
          type: string
        slug:
          deprecated: true
          description: This property is deprecated. Use name instead.
          type: string
      required:
        - name
        - is_self_hosted_only
        - execution_region
      type: object
    AcknowledgeAlertResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://api.tower.dev/v1/schemas/AcknowledgeAlertResponse.json
          format: uri
          readOnly: true
          type: string
        status:
          type: string
      required:
        - status
      type: object
    AcknowledgeAllAlertsResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://api.tower.dev/v1/schemas/AcknowledgeAllAlertsResponse.json
          format: uri
          readOnly: true
          type: string
        count:
          description: Number of alerts that were acknowledged
          format: int64
          type: integer
        status:
          type: string
      required:
        - status
        - count
      type: object
    Alert:
      additionalProperties: false
      properties:
        acked:
          type: boolean
        alert_type:
          type: string
        created_at:
          format: date-time
          type: string
        detail:
          oneOf:
            - $ref: "#/components/schemas/RunFailureAlert"
          type: object
        seq:
          format: int64
          type: integer
        status:
          type: string
      required:
        - alert_type
        - seq
        - detail
        - created_at
        - status
        - acked
      type: object
    App:
      additionalProperties: false
      properties:
        created_at:
          description: The date and time this app was created.
          format: date-time
          type: string
        health_status:
          deprecated: true
          description: This property is deprecated. It will always be 'healthy'.
          enum:
            - healthy
            - warning
          type: string
        is_externally_accessible:
          type: boolean
        last_run:
          $ref: "#/components/schemas/Run"
          deprecated: true
          description: "Deprecated: always null, previously latest run of this app. Use \"runs\" in app summary instead."
        name:
          description: The name of the app.
          type: string
        next_run_at:
          description: The next time this app will run as part of it's schedule, null if none.
          format: date-time
          type:
            - string
            - "null"
        owner:
          description: The account slug that owns this app.
          type: string
        pending_timeout:
          default: 600
          description: The maximum time in seconds that a run can stay in the pending state before being marked as cancelled.
          format: int64
          type: integer
        retry_policy:
          $ref: "#/components/schemas/RunRetryPolicy"
          description: The retry policy for failed runs of this app.
        run_results:
          $ref: "#/components/schemas/RunResults"
          description: The stats of all the runs of this app.
        running_timeout:
          default: 0
          description: The number of seconds that a run can stay running before it gets cancelled. Value of 0 (default) means no timeout.
          format: int64
          type: integer
        schedule:
          deprecated: true
          description: The schedule associated with this app, null if none.
          type:
            - string
            - "null"
        short_description:
          description: A short description of the app. Can be empty.
          type: string
        slug:
          deprecated: true
          description: This property is deprecated. Use name instead.
          type: string
        status:
          description: The status of the app.
          enum:
            - active
            - disabled
          type: string
        subdomain:
          description: The subdomain that this app is accessible via. Must be externally accessible first.
          type: string
        version:
          description: The current version of this app, null if none.
          type:
            - string
            - "null"
      required:
        - name
        - owner
        - short_description
        - version
        - schedule
        - created_at
        - next_run_at
        - health_status
        - is_externally_accessible
        - pending_timeout
        - running_timeout
      type: object
    AppStatistics:
      additionalProperties: false
      properties:
        all_apps:
          format: int64
          type: integer
        disabled_apps:
          format: int64
          type: integer
        healthy_apps:
          format: int64
          type: integer
        running_apps:
          format: int64
          type: integer
      required:
        - all_apps
        - healthy_apps
        - running_apps
        - disabled_apps
      type: object
    AppSummary:
      additionalProperties: false
      properties:
        app:
          $ref: "#/components/schemas/App"
        runs:
          items:
            $ref: "#/components/schemas/Run"
          type: array
      required:
        - app
        - runs
      type: object
    AppVersion:
      additionalProperties: false
      properties:
        created_at:
          format: date-time
          type: string
        parameters:
          items:
            $ref: "#/components/schemas/Parameter"
          type: array
        towerfile:
          description: The Towerfile that this version was created from.
          type: string
        version:
          type: string
      required:
        - version
        - parameters
        - created_at
        - towerfile
      type: object
    AuthenticationContext:
      additionalProperties: false
      properties:
        work_os_access_token:
          description: The WorkOS access token for SSO authentication.
          type: string
      required:
        - work_os_access_token
      type: object
    BatchScheduleParams:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://api.tower.dev/v1/schemas/BatchScheduleParams.json
          format: uri
          readOnly: true
          type: string
        ids:
          description: The IDs of the schedules to modify
          items:
            type: string
          minItems: 1
          type: array
      required:
        - ids
      type: object
    BatchScheduleResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://api.tower.dev/v1/schemas/BatchScheduleResponse.json
          format: uri
          readOnly: true
          type: string
        schedules:
          items:
            $ref: "#/components/schemas/Schedule"
          type: array
      required:
        - schedules
      type: object
    CancelRunResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://api.tower.dev/v1/schemas/CancelRunResponse.json
          format: uri
          readOnly: true
          type: string
        run:
          $ref: "#/components/schemas/Run"
      required:
        - run
      type: object
    Catalog:
      additionalProperties: false
      properties:
        CreatedAt:
          format: date-time
          type: string
        environment:
          type: string
        name:
          type: string
        properties:
          items:
            $ref: "#/components/schemas/CatalogProperty"
          type: array
        slug:
          deprecated: true
          description: This property is deprecated. Use name instead.
          type: string
        type:
          type: string
      required:
        - type
        - name
        - environment
        - properties
        - CreatedAt
      type: object
    CatalogProperty:
      additionalProperties: false
      properties:
        environment_variable:
          description: The environment variable name this property is injected as at runtime.
          type: string
        name:
          type: string
        preview:
          type: string
      required:
        - name
        - preview
      type: object
    ClaimDeviceLoginTicketParams:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://api.tower.dev/v1/schemas/ClaimDeviceLoginTicketParams.json
          format: uri
          readOnly: true
          type: string
        refresh_token:
          description: The refresh token for the session to delegate to the device.
          type: string
        user_code:
          description: The user code to claim.
          type: string
      required:
        - user_code
        - refresh_token
      type: object
    ClaimDeviceLoginTicketResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://api.tower.dev/v1/schemas/ClaimDeviceLoginTicketResponse.json
          format: uri
          readOnly: true
          type: string
        claimed:
          description: Whether the code was successfully claimed.
          type: boolean
      required:
        - claimed
      type: object
    CreateAPIKeyParams:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://api.tower.dev/v1/schemas/CreateAPIKeyParams.json
          format: uri
          readOnly: true
          type: string
        expires_at:
          description: When this API key expires.
          format: date-time
          type:
            - string
            - "null"
        name:
          type: string
        scopes:
          description: Space separated scopes that this API key is valid for.
          type:
            - string
            - "null"
        team:
          description: The team this API key is associated with. This field is optional. You must be a member of the team that you're creating the API key for, and if you're using an API key to create a new API key, the API key you use to authenticate this request must be a personal API key.
          type:
            - string
            - "null"
      required:
        - name
      type: object
    CreateAPIKeyResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://api.tower.dev/v1/schemas/CreateAPIKeyResponse.json
          format: uri
          readOnly: true
          type: string
        api_key:
          $ref: "#/components/schemas/APIKey"
          description: Created API key
      required:
        - api_key
      type: object
    CreateAccountParams:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://api.tower.dev/v1/schemas/CreateAccountParams.json
          format: uri
          readOnly: true
          type: string
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password
      type: object
    CreateAccountParamsFlagsStruct:
      additionalProperties: false
      properties:
        is_test_account:
          type: boolean
      required:
        - is_test_account
      type: object
    CreateAccountResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://api.tower.dev/v1/schemas/CreateAccountResponse.json
          format: uri
          readOnly: true
          type: string
        session:
          $ref: "#/components/schemas/Session"
      required:
        - session
      type: object
    CreateAppParams:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://api.tower.dev/v1/schemas/CreateAppParams.json
          format: uri
          readOnly: true
          type: string
        is_externally_accessible:
          default: false
          description: Indicates that web traffic should be routed to this app and that its runs should get a hostname assigned to it.
          type: boolean
        name:
          description: The name of the app.
          maxLength: 100
          minLength: 1
          type: string
        short_description:
          description: A description of the app.
          type: string
        slug:
          description: The slug of the app. Legacy CLI will send it but we don't need it.
          type: string
        subdomain:
          description: The subdomain this app is accessible under. Requires is_externally_accessible to be true.
          type:
            - string
            - "null"
      required:
        - name
      type: object
    CreateAppResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://api.tower.dev/v1/schemas/CreateAppResponse.json
          format: uri
          readOnly: true
          type: string
        app:
          $ref: "#/components/schemas/App"
      required:
        - app
      type: object
    CreateCatalogParams:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://api.tower.dev/v1/schemas/CreateCatalogParams.json
          format: uri
          readOnly: true
          type: string
        environment:
          type: string
        name:
          type: string
        properties:
          items:
            $ref: "#/components/schemas/EncryptedCatalogProperty"
          type: array
        type:
          enum:
            - snowflake-open-catalog
            - apache-polaris
            - cloudflare-r2-catalog
            - lakekeeper
            - tower-catalog
            - s3-tables
          type: string
      required:
        - name
        - type
        - environment
        - properties
      type: object
    CreateCatalogResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://api.tower.dev/v1/schemas/CreateCatalogResponse.json
          format: uri
          readOnly: true
          type: string
        catalog:
          $ref: "#/components/schemas/Catalog"
      required:
        - catalog
      type: object
    CreateDeviceLoginTicketResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://api.tower.dev/v1/schemas/CreateDeviceLoginTicketResponse.json
          format: uri
          readOnly: true
          type: string
        device_code:
          description: The unique code identifying this device login request.
          type: string
        expires_in:
          description: Number of seconds until this request expires.
          format: int64
          type: integer
        generated_at:
          description: When this device login request was created.
          format: date-time
          type: string
        interval:
          description: Number of seconds to wait between polling attempts.
          format: int64
          type: integer
        login_url:
          description: The URL where the user should go to enter the user code.
          type: string
        user_code:
          description: The code that the user needs to enter to authenticate.
          type: string
        verification_url:
          description: The URL that the device should poll to check authentication status.
          type: string
      required:
        - device_code
        - user_code
        - login_url
        - verification_url
        - generated_at
        - expires_in
        - interval
      type: object
    CreateEnvironmentParams:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://api.tower.dev/v1/schemas/CreateEnvironmentParams.json
          format: uri
          readOnly: true
          type: string
        name:
          description: The name of the environment
          maxLength: 100
          minLength: 1
          type: string
      required:
        - name
      type: object
    CreateEnvironmentResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://api.tower.dev/v1/schemas/CreateEnvironmentResponse.json
          format: uri
          readOnly: true
          type: string
        environment:
          $ref: "#/components/schemas/Environment"
      required:
        - environment
      type: object
    CreateGuestParams:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://api.tower.dev/v1/schemas/CreateGuestParams.json
          format: uri
          readOnly: true
          type: string
        app:
          description: The name of the externally accessible app this guest can access.
          type: string
        expires_in:
          default: 259200
          description: The number of seconds the guest session should last. Defaults to 72 hours.
          format: int64
          type: integer
        name:
          description: Optional display name for the guest.
          type: string
        redirect_url:
          description: Where to redirect the guest after they log in. Defaults to the app's subdomain.
          type: string
      required:
        - app
      type: object
    CreateGuestResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://api.tower.dev/v1/schemas/CreateGuestResponse.json
          format: uri
          readOnly: true
          type: string
        guest:
          $ref: "#/components/schemas/Guest"
          description: The created guest.
        login_url:
          description: The URL to share with the guest for logging in.
          type: string
        login_url_expires_at:
          description: When the login URL expires.
          format: date-time
          type: string
      required:
        - guest
        - login_url
        - login_url_expires_at
      type: object
    CreateSandboxSecretsParams:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://api.tower.dev/v1/schemas/CreateSandboxSecretsParams.json
          format: uri
          readOnly: true
          type: string
        environment:
          description: Environment to create secrets in
          type: string
        secret_keys:
          description: List of secret keys to create with Tower defaults
          items:
            type: string
          type: array
      required:
        - environment
        - secret_keys
      type: object
    CreateSandboxSecretsResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://api.tower.dev/v1/schemas/CreateSandboxSecretsResponse.json
          format: uri
          readOnly: true
          type: string
        created:
          description: List of secret keys that were created
          items:
            type: string
          type: array
      required:
        - created
      type: object
    CreateScheduleParams:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://api.tower.dev/v1/schemas/CreateScheduleParams.json
          format: uri
          readOnly: true
          type: string
        app_name:
          description: The name of the app to create a schedule for
          minLength: 1
          type: string
        app_version:
          deprecated: true
          description: This property is deprecated and ignored. Schedules inherit the version from their environment.
          type:
            - string
            - "null"
        cron:
          description: The cron expression defining when the app should run
          minLength: 1
          type: string
        environment:
          default: default
          description: The environment to run the app in
          type: string
        name:
          description: The name for this schedule. Must be unique per environment. If not set, one will be generated for you.
          type:
            - string
            - "null"
        overlap_policy:
          default: allow
          description: The overlap policy for the schedule
          enum:
            - skip
            - allow
          type:
            - string
            - "null"
        parameters:
          description: Parameters to pass when running the app
          items:
            $ref: "#/components/schemas/RunParameterInput"
          type: array
        status:
          description: The status of the schedule (defaults to active)
          enum:
            - active
            - disabled
          type:
            - string
            - "null"
        timezone:
          default: UTC
          description: The IANA timezone identifier that the cron expression should be evaluated in (e.g., 'America/New_York', 'Europe/London'). Defaults to 'UTC'.
          type:
            - string
            - "null"
      required:
        - app_name
        - cron
      type: object
    CreateScheduleResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://api.tower.dev/v1/schemas/CreateScheduleResponse.json
          format: uri
          readOnly: true
          type: string
        schedule:
          $ref: "#/components/schemas/Schedule"
      required:
        - schedule
      type: object
    CreateSecretParams:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://api.tower.dev/v1/schemas/CreateSecretParams.json
          format: uri
          readOnly: true
          type: string
        encrypted_value:
          type: string
        environment:
          type: string
        name:
          type: string
        preview:
          type: string
      required:
        - name
        - environment
        - encrypted_value
        - preview
      type: object
    CreateSecretResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://api.tower.dev/v1/schemas/CreateSecretResponse.json
          format: uri
          readOnly: true
          type: string
        secret:
          $ref: "#/components/schemas/Secret"
      required:
        - secret
      type: object
    CreateSessionParams:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://api.tower.dev/v1/schemas/CreateSessionParams.json
          format: uri
          readOnly: true
          type: string
        code:
          description: One-time password verification code for two-factor authentication. If the user has two-factor authentication enabled, this code is required to log in.
          type: string
        password:
          type: string
        username:
          type: string
      required:
        - username
        - password
      type: object
    CreateSessionResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://api.tower.dev/v1/schemas/CreateSessionResponse.json
          format: uri
          readOnly: true
          type: string
        session:
          $ref: "#/components/schemas/Session"
          description: The new session information.
      required:
        - session
      type: object
    CreateTeamParams:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://api.tower.dev/v1/schemas/CreateTeamParams.json
          format: uri
          readOnly: true
          type: string
        name:
          description: The name of the team to create
          type: string
      required:
        - name
      type: object
    CreateTeamResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://api.tower.dev/v1/schemas/CreateTeamResponse.json
          format: uri
          readOnly: true
          type: string
        team:
          $ref: "#/components/schemas/Team"
          description: The team that was just created
      required:
        - team
      type: object
    CreateWebhookParams:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://api.tower.dev/v1/schemas/CreateWebhookParams.json
          format: uri
          readOnly: true
          type: string
        name:
          description: The name of the webhook.
          type: string
        url:
          description: The webhook URL.
          type: string
      required:
        - name
        - url
      type: object
    CreateWebhookResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://api.tower.dev/v1/schemas/CreateWebhookResponse.json
          format: uri
          readOnly: true
          type: string
        signing_key:
          type: string
        webhook:
          $ref: "#/components/schemas/Webhook"
      required:
        - webhook
        - signing_key
      type: object
    DeleteAPIKeyParams:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://api.tower.dev/v1/schemas/DeleteAPIKeyParams.json
          format: uri
          readOnly: true
          type: string
        identifier:
          type: string
      required:
        - identifier
      type: object
    DeleteAPIKeyResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://api.tower.dev/v1/schemas/DeleteAPIKeyResponse.json
          format: uri
          readOnly: true
          type: string
        api_key:
          $ref: "#/components/schemas/APIKey"
          description: Created API key
      required:
        - api_key
      type: object
    DeleteAppResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://api.tower.dev/v1/schemas/DeleteAppResponse.json
          format: uri
          readOnly: true
          type: string
        app:
          $ref: "#/components/schemas/App"
      required:
        - app
      type: object
    DeleteCatalogResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://api.tower.dev/v1/schemas/DeleteCatalogResponse.json
          format: uri
          readOnly: true
          type: string
        catalog:
          $ref: "#/components/schemas/Catalog"
      required:
        - catalog
      type: object
    DeleteGuestOutputBody:
      additionalProperties: false
